<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Users - Identity EdTech</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f7; }
        .sidebar { width: 220px; height: 100vh; position: fixed; top: 0; left: 0; background: #1e293b; display: flex; flex-direction: column; }
        .logo { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo span { font-size: 16px; font-weight: 700; color: #fff; }
        .logo small { display: block; font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; }
        .sidebar a { display: block; padding: 13px 20px; color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; border-left: 3px solid transparent; }
        .sidebar a:hover { background: rgba(255,255,255,0.08); border-left-color: #60a5fa; color: #fff; }
        .sidebar a.logout { margin-top: auto; color: #fca5a5; border-top: 1px solid rgba(255,255,255,0.08); }
        .sidebar a.logout:hover { background: rgba(220,38,38,0.2); }
        .main { margin-left: 220px; padding: 28px; }
        .page-title { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
        .card { background: #fff; border-radius: 10px; padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 20px; }
        .card h3 { font-size: 15px; font-weight: 600; color: #1e293b; margin-bottom: 16px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
        .fg { flex: 1; min-width: 130px; }
        .fg label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }
        .fg input, .fg select { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 7px; font-size: 13px; background: #f9fafb; }
        .fg input:focus, .fg select:focus { outline: none; border-color: #1a56db; }
        .btn { padding: 9px 18px; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-blue { background: #1a56db; color: white; }
        .btn-blue:hover { background: #1648c0; }
        .btn-red { background: #dc2626; color: white; text-decoration: none; display: inline-block; }
        .btn-red:hover { background: #b91c1c; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead th { background: #1e293b; color: #fff; padding: 11px 14px; text-align: left; font-weight: 600; }
        tbody td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; }
        tbody tr:hover { background: #f8fafc; }
        .role-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .role-student { background: #dbeafe; color: #1d4ed8; }
        .role-teacher { background: #fef9c3; color: #a16207; }
        .role-admin { background: #fce7f3; color: #be185d; }
        p.empty { color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <span>🎓 Identity EdTech</span>
            <small>Admin Panel</small>
        </div>
        <a href="/admin_dashboard">📊 Dashboard</a>
        <a href="/manage_users">👥 Manage Users</a>
        <a href="/logout" class="logout">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="page-title">👥 Manage Users</div>

        <div class="card">
            <h3>➕ Add New User</h3>
            <form action="/manage_users" method="POST">
                <div class="form-row">
                    <div class="fg">
                        <label>User ID</label>
                        <input type="text" name="id" placeholder="e.g. STU001" required>
                    </div>
                    <div class="fg">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="Full name" required>
                    </div>
                    <div class="fg">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Email address" required>
                    </div>
                    <div class="fg">
                        <label>Role</label>
                        <select name="role" required>
                            <option value="">Select Role</option>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="fg">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Password" required>
                    </div>
                    <div>
                        <button type="submit" class="btn btn-blue">Add User</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card">
            <h3>📋 All Users</h3>
            {% if users %}
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Action</th></tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.id }}</td>
                        <td>{{ user.name }}</td>
                        <td>{{ user.email }}</td>
                        <td><span class="role-badge role-{{ user.role }}">{{ user.role }}</span></td>
                        <td><a href="/delete_user/{{ user.id }}" class="btn btn-red" onclick="return confirm('Delete this user?')">Delete</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p class="empty">No users found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
