<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Material - Identity EdTech</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f7; }
        .sidebar { width: 220px; height: 100vh; position: fixed; top: 0; left: 0; background: #1a56db; display: flex; flex-direction: column; }
        .logo { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .logo span { font-size: 16px; font-weight: 700; color: #fff; }
        .logo small { display: block; font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 3px; }
        .sidebar a { display: block; padding: 13px 20px; color: rgba(255,255,255,0.85); text-decoration: none; font-size: 14px; border-left: 3px solid transparent; }
        .sidebar a:hover { background: rgba(255,255,255,0.1); border-left-color: #fff; color: #fff; }
        .sidebar a.logout { margin-top: auto; color: #fca5a5; border-top: 1px solid rgba(255,255,255,0.1); }
        .sidebar a.logout:hover { background: rgba(220,38,38,0.2); }
        .main { margin-left: 220px; padding: 28px; }
        .page-title { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
        .card { background: #fff; border-radius: 10px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); max-width: 560px; }
        .fg { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        input[type="text"] { width: 100%; padding: 10px 13px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; background: #f9fafb; }
        input[type="text"]:focus { outline: none; border-color: #1a56db; background: #fff; }
        input[type="file"] { width: 100%; padding: 10px; border: 2px dashed #d1d5db; border-radius: 8px; font-size: 13px; background: #f9fafb; cursor: pointer; }
        input[type="file"]:hover { border-color: #1a56db; }
        .hint { font-size: 12px; color: #94a3b8; margin-top: 5px; }
        .btn { padding: 11px 28px; background: #1a56db; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #1648c0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <span>🎓 Identity EdTech</span>
            <small>Teacher Portal</small>
        </div>
        <a href="/teacher_dashboard">🏠 Dashboard</a>
        <a href="/view_students">👥 View Students</a>
        <a href="/upload_material">📤 Upload Material</a>
        <a href="/view_materials">📂 View Materials</a>
        <a href="/logout" class="logout">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="page-title">📤 Upload Material</div>
        <div class="card">
            <form action="/upload_material" method="POST" enctype="multipart/form-data">
                <div class="fg">
                    <label>Material Title</label>
                    <input type="text" name="title" placeholder="e.g. Chapter 1 - Introduction to Python" required>
                </div>
                <div class="fg">
                    <label>Select File</label>
                    <input type="file" name="file" required>
                    <p class="hint">Allowed: PDF, DOCX, PPTX, TXT, PNG, JPG, JPEG</p>
                </div>
                <button type="submit" class="btn">Upload</button>
            </form>
        </div>
    </div>
</body>
</html>
